name: CI

on:
  push:
    branches: ["main", "developers"]
  pull_request:
    branches: ["main", "developers"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Boot Postgres integration database
        run: |
          docker rm -f shelfwise-ci-postgres >/dev/null 2>&1 || true
          docker run --name shelfwise-ci-postgres -d \
            -p 5432:5432 \
            -e POSTGRES_USER=shelfwise \
            -e POSTGRES_PASSWORD=ci-postgres-password \
            -e POSTGRES_DB=shelfwise \
            -e POSTGRES_APP_PASSWORD=ci-app-password \
            -v "$PWD/src/shelfwise_storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro" \
            -v "$PWD/src/shelfwise_storage/init_app_role.sh:/docker-entrypoint-initdb.d/02-app-role.sh:ro" \
            pgvector/pgvector:pg16
          for attempt in $(seq 1 60); do
            if docker exec shelfwise-ci-postgres pg_isready -U shelfwise -d shelfwise; then
              exit 0
            fi
            sleep 1
          done
          docker logs shelfwise-ci-postgres
          exit 1

      - name: Boot Redis integration bus
        run: |
          docker rm -f shelfwise-ci-redis >/dev/null 2>&1 || true
          docker run --name shelfwise-ci-redis -d -p 6379:6379 redis:7-bookworm
          for attempt in $(seq 1 30); do
            if docker exec shelfwise-ci-redis redis-cli ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done
          docker logs shelfwise-ci-redis
          exit 1

      - name: Lint backend
        run: python -m ruff check src tests scripts

      - name: Test backend
        env:
          SHELFWISE_TEST_DATABASE_URL: postgresql://shelfwise_app:ci-app-password@127.0.0.1:5432/shelfwise
          SHELFWISE_TEST_REDIS_URL: redis://127.0.0.1:6379/0
        run: python -m pytest -q

      - name: Run ShelfWise eval gate
        run: python -m shelfwise_eval

      - name: Run backend smoke
        run: python scripts/smoke.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E suite
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Boot production topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
          SHELFWISE_COOKIE_SECURE: "true"
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          docker compose -f docker-compose.production.yml build
          for service in backend frontend; do
            # `docker compose images` lists containers, so it is empty before `up`.
            # Compose builds these unqualified local tags from the service names.
            image="shelfwise-${service}"
            architecture=$(docker image inspect "$image" --format '{{.Architecture}}')
            echo "$service image architecture: $architecture"
            test "$architecture" = amd64
          done
          started=$(date +%s)
          docker compose -f docker-compose.production.yml up --build -d --wait
          elapsed=$(( $(date +%s) - started ))
          echo "Track 3 container readiness: ${elapsed}s"
          test "$elapsed" -lt 60

      - name: Smoke production public origin
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
          SHELFWISE_COOKIE_SECURE: "false"
          SHELFWISE_ALLOW_INSECURE_COOKIE_IN_DISPOSABLE_CI: "true"
        run: |
          trap 'docker compose -f docker-compose.production.yml logs --no-color backend postgres migrate frontend' ERR
          docker compose -f docker-compose.production.yml up -d --wait
          curl --fail --silent --show-error http://127.0.0.1/ > /dev/null
          curl --fail --silent --show-error \
            --cookie-jar /tmp/shelfwise.cookies \
            --request POST http://127.0.0.1/auth/session > /tmp/session.json
          curl --fail --silent --show-error \
            --cookie /tmp/shelfwise.cookies \
            --request POST http://127.0.0.1/scenarios/golden > /tmp/golden.json
          python - <<'PY'
          import json
          from pathlib import Path

          session = json.loads(Path('/tmp/session.json').read_text())
          golden = json.loads(Path('/tmp/golden.json').read_text())
          assert session['mode'] == 'jwt'
          assert session['session']['user_id'].startswith('demo_')
          assert golden['decision']['status'] == 'pending'
          assert golden['decision']['tenant_id'] == session['session']['tenant_id']
          PY

      - name: Shakedown deployed public topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
          SHELFWISE_COOKIE_SECURE: "false"
          SHELFWISE_ALLOW_INSECURE_COOKIE_IN_DISPOSABLE_CI: "true"
        run: |
          python scripts/deployment_shakedown.py \
            --base-url http://127.0.0.1 \
            --cycles 3 \
            --output reports/deployment-shakedown.json

      - name: Track 3 live response and language gate
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
          LLM_ROUTINE_BASE_URL: ${{ secrets.LLM_ROUTINE_BASE_URL }}
          LLM_STRONG_BASE_URL: ${{ secrets.LLM_STRONG_BASE_URL || secrets.LLM_ROUTINE_BASE_URL }}
          LLM_ROUTINE_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_STRONG_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_ROUTINE_MODEL: ${{ secrets.LLM_ROUTINE_MODEL || 'google/gemma-4-E4B-it' }}
          LLM_STRONG_MODEL: ${{ secrets.LLM_STRONG_MODEL || 'google/gemma-4-31B-it' }}
        run: |
          if [ -z "$LLM_ROUTINE_BASE_URL" ] || [ -z "$LLM_ROUTINE_API_KEY" ]; then
            echo "No AMD endpoint credentials configured in CI; live proof is required in the cloud run."
            echo "Production topology and fail-closed behavior are covered by the application tests."
            exit 0
          fi
          docker compose -f docker-compose.production.yml up -d --wait
          python - <<'PY'
          import json
          import time
          import urllib.request

          session_request = urllib.request.Request(
              'http://127.0.0.1/auth/session', method='POST'
          )
          with urllib.request.urlopen(session_request, timeout=5) as response:
              session = json.load(response)
              cookie = response.headers.get('Set-Cookie', '').split(';', 1)[0]
          questions = [
              'What is the current stock position for a generated product?',
              'How should a manager handle an unseen cold-chain question?',
          ]
          responses = []
          for question in questions:
              request = urllib.request.Request(
                  'http://127.0.0.1/chat',
                  data=json.dumps({'question': question}).encode(),
                  headers={'Content-Type': 'application/json', 'Cookie': cookie},
                  method='POST',
              )
              started = time.perf_counter()
              with urllib.request.urlopen(request, timeout=29) as response:
                  body = response.read().decode()
              elapsed = time.perf_counter() - started
              assert elapsed < 30, elapsed
              assert body.strip(), 'empty response'
              assert all(ord(char) < 128 or char.isalpha() for char in body)
              responses.append(body)
          assert responses[0] != responses[1], 'distinct inputs produced identical answers'
          print('Track 3 request/language/unseen-input gate: PASS')
          PY

      - name: Stop production topology
        if: always()
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
        run: docker compose -f docker-compose.production.yml down --volumes

      - name: Stop Postgres integration database
        if: always()
        run: docker rm -f shelfwise-ci-postgres >/dev/null 2>&1 || true

      - name: Stop Redis integration bus
        if: always()
        run: docker rm -f shelfwise-ci-redis >/dev/null 2>&1 || true
