name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Lint backend
        run: python -m ruff check src tests scripts

      - name: Test backend
        run: python -m pytest -q

      - name: Run ShelfWise eval gate
        run: python -m shelfwise_eval

      - name: Run backend smoke
        run: python scripts/smoke.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Boot production topology
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
          SHELFWISE_COOKIE_SECURE: "false"
        run: |
          docker compose -f docker-compose.production.yml build
          started=$(date +%s)
          docker compose -f docker-compose.production.yml up --build -d --wait
          elapsed=$(( $(date +%s) - started ))
          echo "Track 3 container readiness: ${elapsed}s"
          test "$elapsed" -lt 60

      - name: Smoke production public origin
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
        run: |
          trap 'docker compose -f docker-compose.production.yml logs --no-color backend postgres migrate frontend' ERR
          curl --fail --silent --show-error http://127.0.0.1/ > /dev/null
          curl --fail --silent --show-error \
            --cookie-jar /tmp/shelfwise.cookies \
            --request POST http://127.0.0.1/auth/session > /tmp/session.json
          curl --fail --silent --show-error \
            --cookie /tmp/shelfwise.cookies \
            --request POST http://127.0.0.1/demo/golden > /tmp/golden.json
          python - <<'PY'
          import json
          from pathlib import Path

          session = json.loads(Path('/tmp/session.json').read_text())
          golden = json.loads(Path('/tmp/golden.json').read_text())
          assert session['mode'] == 'jwt'
          assert session['session']['user_id'].startswith('demo_')
          assert golden['decision']['status'] == 'pending'
          assert golden['decision']['tenant_id'] == session['session']['tenant_id']
          PY

      - name: Track 3 response and language gate
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          session_request = urllib.request.Request(
              'http://127.0.0.1/auth/session', method='POST'
          )
          with urllib.request.urlopen(session_request, timeout=5) as response:
              session = json.load(response)
              cookie = response.headers.get('Set-Cookie', '').split(';', 1)[0]
          questions = [
              'What is the current stock position for a generated product?',
              'How should a manager handle an unseen cold-chain question?',
          ]
          responses = []
          for question in questions:
              request = urllib.request.Request(
                  'http://127.0.0.1/chat',
                  data=json.dumps({'question': question}).encode(),
                  headers={'Content-Type': 'application/json', 'Cookie': cookie},
                  method='POST',
              )
              started = time.perf_counter()
              with urllib.request.urlopen(request, timeout=29) as response:
                  body = response.read().decode()
              elapsed = time.perf_counter() - started
              assert elapsed < 30, elapsed
              assert body.strip(), 'empty response'
              assert all(ord(char) < 128 or char.isalpha() for char in body)
              responses.append(body)
          assert responses[0] != responses[1], 'distinct inputs produced identical answers'
          print('Track 3 request/language/unseen-input gate: PASS')
          PY

      - name: Stop production topology
        if: always()
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_APP_PASSWORD: ci-app-password
          TENANT_AUTH_SECRET: ci-only-tenant-auth-secret
        run: docker compose -f docker-compose.production.yml down --volumes
