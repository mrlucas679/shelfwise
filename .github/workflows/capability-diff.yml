name: Capability contract

on:
  pull_request:
    paths:
      - ".github/workflows/capability-diff.yml"
      - "capabilities/**"
      - "configs/**"
      - "docker-compose.yml"
      - "frontend/**"
      - "pyproject.toml"
      - "scripts/compare_capability_manifests.py"
      - "src/**"
      - "tests/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/capability-diff.yml"
      - "capabilities/**"
      - "configs/**"
      - "docker-compose.yml"
      - "frontend/**"
      - "pyproject.toml"
      - "scripts/compare_capability_manifests.py"
      - "src/**"
      - "tests/**"

jobs:
  capability-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused verification dependencies
        run: python -m pip install --upgrade pip pydantic pytest ruff

      - name: Validate current capability snapshot
        if: github.event_name != 'pull_request'
        run: python scripts/compare_capability_manifests.py

      - name: Reject capability regressions against PR base
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/compare_capability_manifests.py
          --base-ref "${{ github.event.pull_request.base.sha }}"

      - name: Run capability contract tests
        run: python -m pytest -q -c /dev/null --rootdir . tests/test_capability_*.py

      - name: Lint capability contract
        run: >-
          python -m ruff check
          --isolated
          --line-length 100
          --target-version py311
          --select E,F,I,B,UP,SIM,RUF
          src/shelfwise_capabilities
          tests/test_capability_*.py
          scripts/compare_capability_manifests.py
