server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(auth|catalog|chat|cold-chain|connectors|data|decisions|demo|detective|events|health|inference|ingest|learning|mlops|multimodal|openapi\.json|products|readiness|submission|tenants|tools|traces|worker|writeback)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
