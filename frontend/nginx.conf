server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(auth|catalog|chat|cold-chain|connectors|data|decisions|demo|detective|events|health|inference|ingest|intelligence|inventory|learning|mlops|multimodal|openapi\.json|products|readiness|scan|submission|tenants|tools|trace|traces|twin|voice|worker|writeback)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep the public proxy above the backend/model 120-second operational budget.
        # The former 35-second hackathon target caused Nginx 504s while valid live model
        # work was still running.
        proxy_connect_timeout 15s;
        proxy_send_timeout 150s;
        proxy_read_timeout 150s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
